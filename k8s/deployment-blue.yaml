apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  labels:
    app: sample-app
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
      version: blue
  template:
    metadata:
      labels:
        app: sample-app
        version: blue
    spec:
      containers:
      - name: sample-app
        image: ${DOCKER_IMAGE_BLUE} # This will be replaced or managed by Jenkins
        ports:
        - containerPort: 3000
        env:
        - name: APP_VERSION
          value: "v1.0.0"
        - name: APP_COLOR
          value: "blue"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
