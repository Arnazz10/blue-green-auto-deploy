apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  labels:
    app: sample-app
    version: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
      version: green
  template:
    metadata:
      labels:
        app: sample-app
        version: green
    spec:
      containers:
      - name: sample-app
        image: ${DOCKER_IMAGE_GREEN} # Updated by Jenkins during pipeline execution
        ports:
        - containerPort: 3000
        env:
        - name: APP_VERSION
          value: "v2.0.0"
        - name: APP_COLOR
          value: "green"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
